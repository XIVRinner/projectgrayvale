<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <rect x="8" y="8" width="112" height="112" rx="16" fill="#020617"/>

  <!-- Flow lines -->
  <path d="M30 70 L50 50 L70 70 L90 50"
        stroke="#22c55e"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <path d="M30 70 L50 90 L70 70 L90 90"
        stroke="#22c55e"
        stroke-width="3"
        fill="none"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Nodes -->
  <circle cx="30" cy="70" r="3" fill="#22c55e"/>
  <circle cx="50" cy="50" r="3" fill="#22c55e"/>
  <circle cx="50" cy="90" r="3" fill="#22c55e"/>
  <circle cx="70" cy="70" r="3" fill="#22c55e"/>
  <circle cx="90" cy="50" r="3" fill="#22c55e"/>
  <circle cx="90" cy="90" r="3" fill="#22c55e"/>

  <!-- Small speech bubble -->
  <rect x="44" y="28" width="40" height="20" rx="6" fill="#1e293b"/>
  <polygon points="60,48 64,56 72,48" fill="#1e293b"/>
</svg>
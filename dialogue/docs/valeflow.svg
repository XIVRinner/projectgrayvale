<svg width="400" height="120" viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #0f172a; }
    .line { stroke: #22c55e; stroke-width: 2; fill: none; }
    .node { fill: #22c55e; }
    .text-main { fill: #e2e8f0; font-family: monospace; font-size: 28px; }
    .text-sub { fill: #64748b; font-family: monospace; font-size: 12px; }
  </style>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="400" height="120" rx="12"/>

  <!-- Flow graph -->
  <circle class="node" cx="40" cy="60" r="4"/>
  <circle class="node" cx="80" cy="40" r="4"/>
  <circle class="node" cx="80" cy="80" r="4"/>
  <circle class="node" cx="120" cy="60" r="4"/>

  <path class="line" d="M40 60 L80 40 L120 60"/>
  <path class="line" d="M40 60 L80 80 L120 60"/>

  <!-- Speech bubble -->
  <rect x="140" y="35" width="60" height="40" rx="8" fill="#1e293b"/>
  <polygon points="150,75 155,85 165,75" fill="#1e293b"/>

  <!-- Text inside bubble -->
  <text x="150" y="60" fill="#22c55e" font-family="monospace" font-size="12">"Hi"</text>

  <!-- Title -->
  <text class="text-main" x="220" y="65">Valeflow</text>
  <text class="text-sub" x="222" y="85">dialogue engine</text>
</svg>
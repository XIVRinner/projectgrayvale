@if (session(); as session) {
  <gv-dialog-shell
    [open]="isOpen()"
    [title]="session.title"
    [eyebrow]="session.eyebrow ?? null"
    [subtitle]="session.subtitle ?? null"
    [ariaLabel]="session.title"
    [variant]="'game-dialogue'"
    [width]="'dialogue'"
    [closeDisabled]="session.mode !== 'activity'"
    [showCloseButton]="session.mode === 'activity'"
    (closed)="closeRequested.emit()"
  >
    @switch (session.mode) {
      @case ("valeflow") {
        <gv-game-dialog-view
          [transcript]="session.transcript"
          [currentEntry]="session.currentEntry"
          [choices]="session.choices"
          [canAdvance]="session.canAdvance"
          [sceneImagePath]="session.sceneImagePath ?? null"
          (advanceRequested)="advanceRequested.emit()"
          (choiceSelected)="choiceSelected.emit($event)"
        />
      }
      @case ("activity") {
        <gv-activity-tick-feed [entries]="session.activityTicks ?? []" />
      }
      @default {
        <!-- GAP: Combat dialog mode -->
        <!-- Blocked on: design -->
        <!-- Needs: concrete payload shapes for combat dialog content -->
        <!-- Do not implement until: combat popup contract is specified -->
      }
    }
  </gv-dialog-shell>
}

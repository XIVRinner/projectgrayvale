<div class="gv-shell" [attr.data-layout]="layoutPreset()">
  <gv-shell-topbar
    [title]="title()"
    [subtitle]="subtitle()"
    [statusItems]="statusItems()"
    [saveSummary]="saveSummary()"
    [actions]="topbarActions()"
    (saveManagerRequested)="saveManagerOpenRequested.emit()"
  />

  <main
    class="gv-shell__content-grid"
    [class.gv-shell__content-grid--command-center]="isCommandCenter()"
  >
    <aside class="gv-shell__panel gv-shell__sidebar">
      <gv-shell-character-panel [panel]="characterPanel()" />
    </aside>

    <section class="gv-shell__middle-stack">
      <article class="gv-shell__panel gv-shell__feature-panel">
        <router-outlet></router-outlet>
      </article>

      <article class="gv-shell__panel gv-shell__action-panel">
        <gv-shell-action-panel [groups]="actionGroups()" />
      </article>
    </section>

    <aside class="gv-shell__panel gv-shell__intel-panel">
      <nav class="gv-shell__nav" aria-label="Primary">
        @for (item of navItems(); track item.label) {
          <a
            [routerLink]="item.route"
            routerLinkActive="is-active"
            [routerLinkActiveOptions]="{ exact: true }"
            class="gv-shell__nav-link"
          >
            <span class="gv-shell__nav-label">{{ item.label }}</span>
          </a>
        }
      </nav>

      <section class="gv-shell__ops-panel" aria-label="Operations">
        <h2 class="gv-shell__panel-title">Operations</h2>
      </section>
    </aside>
  </main>

  <gv-shell-footer [version]="version()" />

  <gv-shell-save-manager-modal
    [open]="isSaveManagerOpen()"
    [slots]="saveSlots()"
    [transferPayload]="transferPayload()"
    [statusMessage]="transferStatusMessage()"
    (characterCreationRequested)="characterCreationOpenRequested.emit()"
    (closed)="saveManagerCloseRequested.emit()"
    (slotLoadRequested)="saveSlotLoadRequested.emit($event)"
    (slotDeleteRequested)="saveSlotDeleteRequested.emit($event)"
    (slotExportRequested)="saveSlotExportRequested.emit($event)"
    (exportAllRequested)="saveExportAllRequested.emit()"
    (importRequested)="saveImportRequested.emit()"
    (resetRequested)="saveResetRequested.emit()"
    (transferPayloadChanged)="saveTransferPayloadChanged.emit($event)"
  />

  <gv-shell-character-creation-dialog
    [open]="isCharacterCreationOpen()"
    [required]="isCharacterCreationRequired()"
    (closed)="characterCreationCloseRequested.emit()"
    (characterCreated)="characterCreated.emit()"
  />
</div>
